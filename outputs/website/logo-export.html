<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1C1C1C;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .logo-box {
            background: #1C1C1C;
            padding: 40px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }
        .label {
            color: #555;
            font-family: Arial, sans-serif;
            font-size: 12px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="logo-box">
        <p class="label">Screenshot dit logo voor Tidio</p>

        <!-- Klein (avatar formaat) -->
        <svg width="80" height="80" viewBox="0 0 44 44" fill="none">
            <rect x="19" y="6" width="6" height="32" rx="1" fill="#C9A84C"/>
            <path d="M8 36 Q14 28 22 22 Q30 16 36 8" stroke="#E8C97A" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.9"/>
            <circle cx="8" cy="36" r="2.5" fill="#E8C97A" opacity="0.9"/>
            <circle cx="36" cy="8" r="2.5" fill="#E8C97A" opacity="0.9"/>
        </svg>

        <!-- Groot (voor duidelijk zicht) -->
        <svg width="200" height="200" viewBox="0 0 44 44" fill="none">
            <rect x="19" y="6" width="6" height="32" rx="1" fill="#C9A84C"/>
            <path d="M8 36 Q14 28 22 22 Q30 16 36 8" stroke="#E8C97A" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.9"/>
            <circle cx="8" cy="36" r="2.5" fill="#E8C97A" opacity="0.9"/>
            <circle cx="36" cy="8" r="2.5" fill="#E8C97A" opacity="0.9"/>
        </svg>

        <p class="label">Maak een screenshot en upload in Tidio</p>
    </div>
</body>
</html>
