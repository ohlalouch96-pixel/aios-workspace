<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CTA Preview</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #131316;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            gap: 60px;
        }

        .option {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }
        .option-label {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: #555;
        }

        /* OPTIE A — Ghost */
        .btn-a {
            background: transparent;
            color: #C9A84C;
            border: 1px solid rgba(201,168,76,0.5);
            padding: 14px 36px;
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.06em;
            text-decoration: none;
            border-radius: 100px;
            transition: all 0.3s ease;
            cursor: pointer;
            display: inline-block;
        }
        .btn-a:hover {
            background: #C9A84C;
            color: #000;
            border-color: #C9A84C;
            box-shadow: 0 0 24px rgba(201,168,76,0.45);
        }

        /* OPTIE B — Pill + lift + gloed */
        .btn-b {
            background: #C9A84C;
            color: #000;
            border: none;
            padding: 14px 36px;
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.06em;
            text-decoration: none;
            border-radius: 100px;
            box-shadow: 0 4px 20px rgba(201,168,76,0.2);
            transition: all 0.3s ease;
            cursor: pointer;
            display: inline-block;
        }
        .btn-b:hover {
            background: #E8C97A;
            box-shadow: 0 8px 32px rgba(201,168,76,0.55);
            transform: translateY(-3px);
        }

        /* OPTIE C — Gradient + lift */
        .btn-c {
            background: linear-gradient(135deg, #C9A84C, #E8C97A);
            color: #000;
            border: none;
            padding: 14px 36px;
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.06em;
            text-decoration: none;
            border-radius: 50px;
            transition: all 0.3s ease;
            cursor: pointer;
            display: inline-block;
        }
        .btn-c:hover {
            background: linear-gradient(135deg, #E8C97A, #C9A84C);
            box-shadow: 0 8px 28px rgba(201,168,76,0.5);
            transform: translateY(-3px);
        }
    </style>
</head>
<body>

    <div class="option">
        <span class="option-label">A — Ghost</span>
        <a class="btn-a">Plan een kennismaking</a>
    </div>

    <div class="option">
        <span class="option-label">B — Pill + lift + gloed</span>
        <a class="btn-b">Plan een kennismaking</a>
    </div>

    <div class="option">
        <span class="option-label">C — Gradient + lift</span>
        <a class="btn-c">Plan een kennismaking</a>
    </div>

</body>
</html>
